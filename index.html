<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Opens</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:system-ui, sans-serif; overflow:hidden; }
    .page-wrap { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1rem; position:relative; }
    .overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.65); z-index:2; text-decoration:none; }
    .overlay span { display:inline-flex; align-items:center; justify-content:center; padding:1rem 2rem; border:2px solid #fff; border-radius:999px; color:#fff; text-decoration:none; font-size:1.5rem; letter-spacing:.18em; text-transform:uppercase; background:rgba(255,255,255,0.08); transition:background .2s, transform .2s; }
    .overlay:hover span { background:rgba(255,255,255,0.18); transform:scale(1.02); }
    .video-wrap { width:100%; max-width:100vw; z-index:1; }
    video { width:100%; height:auto; max-height:calc(100vh - 2rem); border-radius:16px; background:#000; }
  </style>
</head>
<body>
  <div class="page-wrap">
    <a class="overlay" href="index1.html"><span>ENTER</span></a>
    <div class="video-wrap">
      <video controls autoplay muted playsinline>
        <source src="videos/zastavkaVkino.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
    </div>
  </div>
</body>
</html>
